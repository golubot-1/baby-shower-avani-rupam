<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #fdfaf5;
            --gold: #af8f2c;
            --text-main: #1a1a1a;
            --red: #e74c3c;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Cinzel Decorative', serif;
            text-align: center;
            color: var(--gold);
            margin-bottom: 2rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #fff;
            padding: 1.5rem;
            border: 1px solid #eee;
            text-align: center;
            border-radius: 4px;
        }
        .stat-num {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            display: block;
        }
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
        }
        table {
            width: 100%;
            background: #fff;
            border-collapse: collapse;
            border: 1px solid #eee;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f9f9f9;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .status-yes { color: #27ae60; font-weight: 600; }
        .status-no { color: #e74c3c; font-weight: 600; }
        .prediction-girl { color: #d63031; }
        .prediction-boy { color: #0984e3; }
        .btn {
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .btn-delete {
            background: transparent;
            color: var(--red);
            border: 1px solid var(--red);
        }
        .btn-delete:hover {
            background: var(--red);
            color: #fff;
        }
        #login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #fff;
            padding: 2rem;
            border: 1px solid #eee;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            background: var(--text-main);
            color: #fff;
        }
        #admin-content { display: none; }
        .utils {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div id="login-box">
    <h1>Admin Access</h1>
    <input type="password" id="passkey" placeholder="Enter Access Key">
    <button class="btn btn-primary" onclick="login()">Unlock Guest List</button>
</div>

<div id="admin-content" class="container">
    <h1>Guest List</h1>
    
    <div class="stats">
        <div class="stat-card">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label">RSVP Forms</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="stat-count">0</span>
            <span class="stat-label">Confirmed Guests</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="stat-girl">0</span>
            <span class="stat-label">Team Girl</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="stat-boy">0</span>
            <span class="stat-label">Team Boy</span>
        </div>
    </div>

    <div class="utils">
        <input type="text" id="search" placeholder="Search by name..." style="width: 300px; margin:0;" oninput="filterTable()">
        <div style="display: flex; gap: 0.5rem;">
            <button class="btn" onclick="downloadCSV()" style="background:var(--gold); color:#fff;">Download Guest List (CSV)</button>
            <button class="btn" onclick="logout()" style="background:#eee; color:#666;">Logout</button>
        </div>
    </div>

    <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
        <button class="btn" onclick="showTab('rsvps')" id="tab-rsvps" style="background:var(--gold); color:#fff;">RSVPs</button>
        <button class="btn" onclick="showTab('advice')" id="tab-advice" style="background:#eee; color:#666;">Advice Wall</button>
        <button class="btn" onclick="showTab('visits')" id="tab-visits" style="background:#eee; color:#666;">Visits</button>
    </div>

    <div id="rsvps-tab">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Count</th>
                    <th>Prediction</th>
                    <th>Message</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="guest-table">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </div>

    <div id="advice-tab" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Advice</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="advice-table"></tbody>
        </table>
    </div>

    <div id="visits-tab" style="display:none;">
        <div class="stats" style="margin-bottom:1.5rem;">
            <div class="stat-card">
                <span class="stat-num" id="stat-total-visits">0</span>
                <span class="stat-label">Total Visits</span>
            </div>
            <div class="stat-card">
                <span class="stat-num" id="stat-unique-visits">0</span>
                <span class="stat-label">Unique IPs</span>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Location</th>
                    <th>Device</th>
                    <th>Page</th>
                    <th>Last Visit</th>
                    <th>Visits</th>
                </tr>
            </thead>
            <tbody id="visits-table"></tbody>
        </table>
    </div>
</div>

<script>
    let allRSVPs = [];

    window.onload = () => {
        const savedKey = localStorage.getItem('as_key');
        if (savedKey) {
            document.getElementById('passkey').value = savedKey;
            fetchRSVPs(savedKey);
        }
    };

    function login() {
        const key = document.getElementById('passkey').value;
        localStorage.setItem('as_key', key);
        fetchRSVPs(key);
    }

    function logout() {
        localStorage.removeItem('as_key');
        location.reload();
    }

    async function fetchRSVPs(key) {
        const res = await fetch(`/api/rsvps?key=${key}`);
        if (res.status === 401) {
            alert('Invalid Key');
            localStorage.removeItem('as_key');
            return;
        }
        const data = await res.json();
        allRSVPs = data.rsvps || [];
        renderTable(allRSVPs);
        
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
    }

    function renderTable(list) {
        const table = document.getElementById('guest-table');
        table.innerHTML = '';
        
        let totalGuests = 0;
        let girls = 0;
        let boys = 0;

        if (list.length === 0) {
            table.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:2rem; color:#999;">No entries found.</td></tr>';
        } else {
            list.forEach(rsvp => {
                const isYes = rsvp.attending === 'yes';
                if (isYes) totalGuests += parseInt(rsvp.guests || 1);
                if (rsvp.prediction === 'girl') girls++;
                if (rsvp.prediction === 'boy') boys++;

                const date = new Date(rsvp.timestamp).toLocaleDateString();

                const row = `<tr>
                    <td style="font-size:0.8rem; color:#999;">${date}</td>
                    <td><strong>${rsvp.name}</strong></td>
                    <td style="font-size:0.85rem; color:#666;">${rsvp.email || '-'}</td>
                    <td class="${isYes ? 'status-yes' : 'status-no'}">${isYes ? 'Yes' : 'No'}</td>
                    <td>${isYes ? (rsvp.guests || 1) : '-'}</td>
                    <td class="prediction-${rsvp.prediction}">${rsvp.prediction || '-'}</td>
                    <td style="font-size: 0.9rem; color: #666;">${rsvp.message || ''}</td>
                    <td>
                        <button class="btn btn-delete" onclick="deleteEntry('${rsvp.id}')">Delete</button>
                    </td>
                </tr>`;
                table.innerHTML += row;
            });
        }

        document.getElementById('stat-total').textContent = list.length;
        document.getElementById('stat-count').textContent = totalGuests;
        document.getElementById('stat-girl').textContent = girls;
        document.getElementById('stat-boy').textContent = boys;
    }

    function filterTable() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = allRSVPs.filter(r => r.name.toLowerCase().includes(q));
        renderTable(filtered);
    }

    async function deleteEntry(id) {
        if (!confirm('Are you sure you want to delete this RSVP?')) return;
        const key = localStorage.getItem('as_key');
        const res = await fetch(`/api/rsvps/${id}?key=${key}`, { method: 'DELETE' });
        if (res.ok) {
            allRSVPs = allRSVPs.filter(r => r.id !== id);
            renderTable(allRSVPs);
        } else {
            alert('Delete failed');
        }
    }

    function showTab(tab) {
        ['rsvps', 'advice', 'visits'].forEach(t => {
            document.getElementById(t + '-tab').style.display = tab === t ? 'block' : 'none';
            document.getElementById('tab-' + t).style.background = tab === t ? 'var(--gold)' : '#eee';
            document.getElementById('tab-' + t).style.color = tab === t ? '#fff' : '#666';
        });
        if (tab === 'advice') fetchAdvice();
        if (tab === 'visits') fetchVisits();
    }

    async function fetchVisits() {
        try {
            const key = localStorage.getItem('as_key');
            const res = await fetch('/api/visits?key=' + key);
            const data = await res.json();
            document.getElementById('stat-total-visits').textContent = data.total || 0;
            document.getElementById('stat-unique-visits').textContent = data.unique || 0;

            const visits = data.visits || [];
            // Group by IP
            const byIp = {};
            visits.forEach(v => {
                if (!byIp[v.ip]) byIp[v.ip] = { count: 0, pages: new Set(), devices: new Set(), location: '', last: v.timestamp };
                byIp[v.ip].count++;
                byIp[v.ip].pages.add(v.page);
                if (v.device) byIp[v.ip].devices.add(v.device);
                if (v.location) byIp[v.ip].location = v.location;
                if (new Date(v.timestamp) > new Date(byIp[v.ip].last)) byIp[v.ip].last = v.timestamp;
            });

            const table = document.getElementById('visits-table');
            const entries = Object.entries(byIp).sort((a, b) => new Date(b[1].last) - new Date(a[1].last));
            if (entries.length === 0) {
                table.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem; color:#999;">No visits yet.</td></tr>';
                return;
            }
            table.innerHTML = entries.map(([ip, info]) => `<tr>
                <td><strong>${ip}</strong></td>
                <td style="font-size:0.85rem; color:#666;">${info.location || '-'}</td>
                <td style="font-size:0.85rem; color:#666;">${[...info.devices].join(', ') || '-'}</td>
                <td style="font-size:0.85rem; color:#666;">${[...info.pages].join(', ')}</td>
                <td style="font-size:0.8rem; color:#999;">${new Date(info.last).toLocaleString()}</td>
                <td>${info.count}</td>
            </tr>`).join('');
        } catch (err) {
            console.error(err);
        }
    }

    let allAdvice = [];
    async function fetchAdvice() {
        try {
            const res = await fetch('/api/advice');
            const data = await res.json();
            allAdvice = data.advice || [];
            renderAdvice(allAdvice);
        } catch (err) {
            console.error(err);
        }
    }

    function renderAdvice(list) {
        const table = document.getElementById('advice-table');
        if (list.length === 0) {
            table.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:2rem; color:#999;">No advice yet.</td></tr>';
            return;
        }
        table.innerHTML = list.map(a => `<tr>
            <td style="font-size:0.8rem; color:#999;">${new Date(a.timestamp).toLocaleDateString()}</td>
            <td><strong>${a.guest_name}</strong></td>
            <td style="font-size:0.9rem; color:#666;">${a.advice_text}</td>
            <td><button class="btn btn-delete" onclick="deleteAdvice('${a.id}')">Delete</button></td>
        </tr>`).join('');
    }

    async function deleteAdvice(id) {
        if (!confirm('Delete this advice?')) return;
        const key = localStorage.getItem('as_key');
        const res = await fetch(`/api/advice/${id}?key=${key}`, { method: 'DELETE' });
        if (res.ok) {
            allAdvice = allAdvice.filter(a => a.id !== id);
            renderAdvice(allAdvice);
        } else {
            alert('Delete failed');
        }
    }

    function downloadCSV() {
        if (allRSVPs.length === 0) return alert("Nothing to download.");
        
        const headers = ["Date", "Name", "Email", "Attending", "Guests", "Prediction", "Message"];
        const rows = allRSVPs.map(r => [
            new Date(r.timestamp).toLocaleDateString(),
            r.name,
            r.email || "",
            r.attending,
            r.guests,
            r.prediction,
            (r.message || "").replace(/,/g, " ") // avoid csv break
        ]);

        let csvContent = "data:text/csv;charset=utf-8," 
            + headers.join(",") + "\n"
            + rows.map(e => e.join(",")).join("\n");

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `guest_list_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
